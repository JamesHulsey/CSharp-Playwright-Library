# Runs the TodoApp UI test suite on every merge to main.
#
# A merge into main lands as a push to main, so that is the trigger. The job builds
# just the UI test project (which pulls in the library via its project reference),
# installs the one browser those tests need, and runs only the UI tests — not the
# library smoke tests. The UI suite drives the library end to end, so it is the
# meaningful gate.

name: UI Tests

on:
  push:
    branches: [ main ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install the .NET 10 SDK.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3. Restore + build only the UI test project (this also builds the library
      #    it references — no need to build the whole solution).
      - name: Restore
        run: dotnet restore samples/TodoApp.UiTests/TodoApp.UiTests.csproj

      - name: Build
        run: dotnet build samples/TodoApp.UiTests/TodoApp.UiTests.csproj --no-restore

      # 4. Install Chromium and its Linux OS dependencies so the browser can launch
      #    headless on the runner. playwright.ps1 is emitted into the build output.
      - name: Install Playwright browsers
        run: pwsh samples/TodoApp.UiTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      # 5. Run only the UI tests.
      - name: Run UI tests
        run: dotnet test samples/TodoApp.UiTests/TodoApp.UiTests.csproj --no-build --verbosity normal
