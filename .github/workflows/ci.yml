# Runs the sample test suites on every merge to main.
#
# A merge into main lands as a push to main, so that is the trigger. The job builds
# the two sample projects (each pulls in the library via its project reference),
# installs the one browser the UI tests need, and runs both suites — the TodoApp UI
# tests and the Toolshop API tests. It does not run the library smoke tests; the
# samples drive the library end to end and are the meaningful gate.

name: Tests

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install the .NET 10 SDK.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3. Restore + build the two sample projects (which build the library too).
      - name: Restore
        run: |
          dotnet restore samples/TodoApp.UiTests/TodoApp.UiTests.csproj
          dotnet restore samples/Toolshop.Tests/Toolshop.Tests.csproj

      - name: Build
        run: |
          dotnet build samples/TodoApp.UiTests/TodoApp.UiTests.csproj --no-restore
          dotnet build samples/Toolshop.Tests/Toolshop.Tests.csproj --no-restore

      # 4. Install Chromium and its Linux OS dependencies (needed by the UI tests).
      #    Installing once covers both projects — the browser cache is machine-wide.
      - name: Install Playwright browsers
        run: pwsh samples/TodoApp.UiTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      # 5. Run both sample suites.
      - name: Run TodoApp UI tests
        run: dotnet test samples/TodoApp.UiTests/TodoApp.UiTests.csproj --no-build --verbosity normal

      # Toolshop's UI is behind Cloudflare bot-protection, which blocks headless
      # browsers from CI data-center IPs — the app never renders there. So the UI
      # tests (Category=ExternalUi) are excluded here and run locally instead; CI
      # covers the Toolshop API tests plus the TodoApp UI suite above.
      - name: Run Toolshop tests (API; UI excluded)
        run: dotnet test samples/Toolshop.Tests/Toolshop.Tests.csproj --no-build --verbosity normal --filter "TestCategory!=ExternalUi"
