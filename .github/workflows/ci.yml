# GitHub Actions CI for the Playwright library + smoke tests.
#
# A "workflow" is one YAML file. It has triggers (`on:`) and one or more `jobs`.
# Each job runs on a fresh virtual machine ("runner") and is a list of `steps`.
# Steps are either a prebuilt action (`uses:`) or a shell command (`run:`).

name: CI

# When should this run?
#   - push to main:        every commit that lands on main
#   - pull_request → main: every PR, so you get a green/red check before merging
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Ubuntu is the fastest and cheapest GitHub-hosted runner. PowerShell (pwsh)
    # comes preinstalled on it, which the browser-install step below relies on.
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository onto the runner.
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install the .NET 10 SDK.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3. Restore NuGet packages (separated from build so failures are easy to spot).
      - name: Restore
        run: dotnet restore

      # 4. Build without restoring again.
      - name: Build
        run: dotnet build --no-restore

      # 5. Download the Chromium binary AND its Linux OS dependencies.
      #    `--with-deps` installs the system libraries the browser needs to launch
      #    on a headless Linux runner — the GlobalSetup fixture alone can't do that.
      #    playwright.ps1 is emitted into the test project's build output.
      - name: Install Playwright browsers
        run: pwsh tests/PlaywrightLibrary.SmokeTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      # 6. Run the tests against the already-built output (--no-build avoids a rebuild).
      - name: Test
        run: dotnet test --no-build --verbosity normal
